# mushi configuration
name: my-agent
soul: ./memory/SOUL.md

model:
  provider: ollama          # ollama | openai-compatible
  base_url: http://localhost:11434
  model: llama3.2           # any model the provider supports
  context_size: 8192        # tokens — the framework adapts to this

loop:
  interval: 60s             # default cycle interval
  min_interval: 30s
  max_interval: 4h

perception:
  - name: filesystem
    script: ./plugins/fs-watch.sh
    interval: 60s
    category: workspace

  - name: clock
    script: ./plugins/clock.sh
    interval: 300s
    category: system

context:
  # Budget allocation (percentages of available tokens)
  identity: 15              # SOUL.md
  perception: 35            # perception signals
  memory: 25                # relevant memory
  conversation: 20          # recent exchanges
  buffer: 5                 # safety margin

memory:
  dir: ./memory
