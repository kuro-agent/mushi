# mushi agent configuration
# Copy this file and customize for your setup.
# Usage: npm start [config-file]  (default: agent.yaml)

name: my-agent
soul: ./memory/SOUL.md

model:
  provider: openai
  base_url: http://localhost:8000
  model: Qwen3.5-9B-Claude-4.6-Opus-Distilled-MLX-4bit
  api_key: omlx-local
  chat_template_kwargs:
    enable_thinking: false
  context_size: 8192

loop:
  sense_interval: 5s

perception:
  - name: filesystem
    script: ./plugins/fs-watch.sh
    interval: 60s
    category: workspace

  - name: dev-watcher
    script: ./plugins/dev-watcher.sh
    interval: 60s
    category: workspace
    trigger: true
    strip_pattern: "\\d+ (seconds?|minutes?|hours?|days?|weeks?|months?) ago"

  - name: inbox
    script: ./plugins/inbox.sh
    interval: 30s
    category: communication
    trigger: true

  - name: clock
    script: ./plugins/clock.sh
    interval: 300s
    category: system

context:
  identity: 15
  perception: 35
  memory: 25
  conversation: 20

memory:
  dir: ./memory

server:
  port: 3000
