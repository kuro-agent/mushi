# mushi — your agent's configuration
# Edit 'name' and 'memory/SOUL.md' to define your agent's identity.
name: mushi
soul: ./memory/SOUL.md

model:
  provider: ollama          # ollama | openai-compatible
  base_url: http://localhost:11434
  model: qwen2.5:1.5b       # A/B test: 2.3x faster prompt eval than llama3.2:3b
  context_size: 8192        # tokens — the framework adapts to this

loop:
  interval: 10s             # near-zero gap — let model latency be the bottleneck, not scheduling
  min_interval: 5s          # effectively "as fast as possible"
  max_interval: 5m           # still cap self-scheduling, but much tighter

perception:
  - name: filesystem
    script: ./plugins/fs-watch.sh
    interval: 60s
    category: workspace

  - name: dev-watcher
    script: ./plugins/dev-watcher.sh
    interval: 60s
    category: workspace

  - name: inbox
    script: ./plugins/inbox.sh
    interval: 30s
    category: communication

  - name: clock
    script: ./plugins/clock.sh
    interval: 300s
    category: system

context:
  # Budget allocation (percentages of available tokens)
  identity: 15              # SOUL.md
  perception: 35            # perception signals
  memory: 25                # relevant memory
  conversation: 20          # recent exchanges
  buffer: 5                 # safety margin

memory:
  dir: ./memory

server:
  port: 3000                    # HTTP API for interaction
