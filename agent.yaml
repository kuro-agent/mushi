# mushi agent configuration
# Copy this file and customize for your setup.
# Usage: npm start [config-file]  (default: agent.yaml)

name: my-agent
soul: ./memory/SOUL.md

model:
  provider: openai
  base_url: http://localhost:8000
  model: Qwen3.5-0.8B-MLX-4bit
  api_key: omlx-local
  chat_template_kwargs:
    enable_thinking: false
  context_size: 8192

# Fast triage model — 0.8B for classification/routing tasks
# Based on local-llm-benchmark: 109ms classification, same quality as 9B
triage_model:
  provider: openai
  base_url: http://localhost:8000
  model: Qwen3.5-0.8B-MLX-4bit
  api_key: omlx-local
  chat_template_kwargs:
    enable_thinking: false
  context_size: 4096
  max_tokens: 150
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  presence_penalty: 1.5

loop:
  sense_interval: 5s

perception:
  - name: filesystem
    script: ./plugins/fs-watch.sh
    interval: 60s
    category: workspace

  - name: dev-watcher
    script: ./plugins/dev-watcher.sh
    interval: 60s
    category: workspace
    trigger: true
    strip_pattern: "\\d+ (seconds?|minutes?|hours?|days?|weeks?|months?) ago"

  - name: inbox
    script: ./plugins/inbox.sh
    interval: 30s
    category: communication
    trigger: true

  - name: clock
    script: ./plugins/clock.sh
    interval: 300s
    category: system

context:
  identity: 15
  perception: 35
  memory: 25
  conversation: 20

memory:
  dir: ./memory

server:
  port: 3000
